# Despliegue automático al VPS cuando haces push a main
# Configura los Secrets en GitHub: Settings → Secrets and variables → Actions

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar por SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR || '/opt/comandas/spring-cloud-demo' }}"
            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main
            chmod +x scripts/deploy-vps.sh
            ./scripts/deploy-vps.sh
