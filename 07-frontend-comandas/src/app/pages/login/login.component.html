<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-panel">
    <div class="login-brand">
      <div class="app-logo">C</div>
      <div>
        <p>Comandas</p>
        <h1>Restaurantes</h1>
      </div>
    </div>

    <p class="login-sub">Ingrese con su usuario del restaurante</p>

    <form class="login-form" (ngSubmit)="submit()">
      <label>Usuario</label>
      <input [(ngModel)]="username" name="username" required autocomplete="username" placeholder="mozo1" />

      <label>Contraseña</label>
      <input
        [(ngModel)]="password"
        name="password"
        type="password"
        required
        autocomplete="current-password"
        placeholder="••••••••" />

      <button type="submit" class="btn-login" [disabled]="loading()">
        {{ loading() ? 'Entrando...' : 'Ingresar' }}
      </button>
    </form>

    @if (error()) {
      <div class="login-error">{{ error() }}</div>
    }

    <div class="demo-users">
      <p>Acceso demo</p>
      <div class="demo-chips">
        <button type="button" class="demo-chip" (click)="usarDemo('admin', 'admin123')">Admin</button>
        <button type="button" class="demo-chip" (click)="usarDemo('mozo1', 'mozo123')">Mozo</button>
        <button type="button" class="demo-chip" (click)="usarDemo('cocina1', 'cocina123')">Cocina</button>
      </div>
    </div>
  </div>
</div>
