# =============================================================================
# Auth Service â€” JWT y usuarios (puerto 8083)
# Depende de: Eureka (8761), Config Server (8888)
# Swagger UI: http://localhost:8083/swagger-ui.html
# =============================================================================

server:
  port: 8083

spring:
  application:
    name: auth-service
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/comandas_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:mysql}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

auth:
  jwt:
    secret: ${JWT_SECRET:comandas-cibertec-mvp-secret-key-2026-min-32-chars}
    expiration-hours: 12

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true


